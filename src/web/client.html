<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaylandWebStream Client</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }
        #canvas {
            display: block;
            touch-action: none;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
        }
        .status-connecting { color: #ffa500; }
        .status-connected { color: #00ff00; }
        .status-error { color: #ff0000; }
    </style>
</head>
<body>
    <div id="status" class="status-connecting">Connecting...</div>
    <canvas id="canvas"></canvas>

    <script>
        console.log('WaylandWebStream client starting...');

        const status = document.getElementById('status');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let ws = null;       // control channel: touch/pointer/resize/latency
        let videoWs = null;  // binary H.264 frame stream
        let decoder = null;
        let keyframeSeen = false;
        let canvasSized = false;

        const DECODER_CONFIG = { codec: 'avc1.42E01F', optimizeForLatency: true };

        // VideoDecoder's internal decode queue has no cap of its own: if
        // frames arrive faster than they can be decoded (bursty/slow remote
        // network, decode contention), decode() backlog grows without bound
        // and every queued frame's reported latency climbs forever. Mirror
        // the server's "skip to newest, resync on next keyframe" policy
        // (src/webrtc/signaling.rs) on the client side too.
        const MAX_DECODE_QUEUE = 2;

        // Dropping a delta frame breaks the H.264 reference chain for the
        // rest of the GOP, so decode can't safely resume until a keyframe.
        // The periodic keyframe (every `keyframe_interval`, ~2s by default)
        // is too far away to wait for without a visible freeze, so ask the
        // server for one right away instead.
        let keyframeRequestPending = false;
        function requestKeyframe() {
            if (keyframeRequestPending) return;
            keyframeRequestPending = true;
            wsSend({ type: 'request_keyframe' });
        }

        // ---- Diagnostics: is delivery steady, or arriving in bursts? ----
        // Tracks the gap between successive WebSocket message arrivals (not
        // decode time) to tell apart "decoder is genuinely too slow" from
        // "frames are arriving in bursts" (e.g. TCP head-of-line blocking
        // after a stall) -- the latter looks identical from decode latency
        // alone but has a different fix.
        let lastMessageArrivalTime = null;
        let arrivalGapSamples = [];
        let maxQueueSeenInWindow = 0;
        let maxFrameBytesInWindow = 0;

        function setStatus(text, className) {
            status.textContent = text;
            status.className = className;
        }

        // ---- WebCodecs decode + paint ----

        function setupDecoder() {
            decoder = new VideoDecoder({
                output: handleFrame,
                error: (e) => console.error('Decoder error:', e),
            });
            // Baseline profile (0x42), constraint flags E0, level 3.1 (0x1F) --
            // matches the x264 `profile=baseline level=3.1` settings in
            // src/encoder/mod.rs. No `description` needed: the stream is
            // Annex-B with SPS/PPS repeated inline on every keyframe
            // (`repeat_headers=1`). Default hardwareAcceleration (not
            // "prefer-software") since baseline 4:2:0 decodes fine on phones.
            decoder.configure(DECODER_CONFIG);
        }

        function handleFrame(frame) {
            if (!canvasSized) {
                canvas.width = frame.displayWidth;
                canvas.height = frame.displayHeight;
                canvasSized = true;
            }
            ctx.drawImage(frame, 0, 0);
            recordDecodeLatency(performance.now() - frame.timestamp / 1000);
            frame.close();
        }

        // Wire format from /stream, one binary WebSocket message per frame:
        //   byte 0    : frame_type (0 = delta, 1 = key)
        //   bytes 1-4 : frame_id (u32, big-endian) -- unused client-side for now
        //   bytes 5.. : raw Annex-B H.264 for the whole frame
        function onStreamMessage(event) {
            const buf = event.data;
            const view = new DataView(buf);
            const isKey = view.getUint8(0) === 1;

            const arrivalNow = performance.now();
            if (lastMessageArrivalTime !== null) {
                arrivalGapSamples.push(arrivalNow - lastMessageArrivalTime);
            }
            lastMessageArrivalTime = arrivalNow;
            maxQueueSeenInWindow = Math.max(maxQueueSeenInWindow, decoder.decodeQueueSize);
            maxFrameBytesInWindow = Math.max(maxFrameBytesInWindow, buf.byteLength);

            if (decoder.decodeQueueSize > MAX_DECODE_QUEUE) {
                if (!isKey) {
                    // Already backlogged -- drop this delta rather than add
                    // to the queue, and ask for a fresh keyframe to resync
                    // instead of waiting out the rest of the GOP.
                    keyframeSeen = false;
                    requestKeyframe();
                    return;
                }
                // A keyframe arrived while backlogged: stale frames already
                // queued would otherwise still be decoded first, so flush
                // the decoder to catch up immediately instead of working
                // through them.
                decoder.reset();
                decoder.configure(DECODER_CONFIG);
            }

            const data = new Uint8Array(buf, 5);

            // A delta frame decoded without a preceding keyframe has no
            // reference picture to diff against, so drop deltas until the
            // first key chunk has been fed to the decoder.
            if (!isKey && !keyframeSeen) {
                return;
            }
            if (isKey) {
                keyframeSeen = true;
                keyframeRequestPending = false;
            }

            const chunk = new EncodedVideoChunk({
                type: isKey ? 'key' : 'delta',
                // EncodedVideoChunk timestamps just need to be monotonic
                // microseconds; there's no presentation clock to sync to
                // here, so arrival time doubles as a decode-latency stamp.
                timestamp: Math.round(performance.now() * 1000),
                data,
            });

            try {
                decoder.decode(chunk);
            } catch (e) {
                console.error('Decode error:', e);
            }
        }

        function connectVideoStream() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const url = `${wsProtocol}//${window.location.host}/stream`;

            console.log('Connecting to video stream:', url);
            videoWs = new WebSocket(url);
            videoWs.binaryType = 'arraybuffer';

            videoWs.onopen = () => {
                console.log('Video stream connected');
                setStatus('Connected - Streaming', 'status-connected');
            };

            videoWs.onmessage = onStreamMessage;

            videoWs.onerror = (error) => {
                console.error('Video stream error:', error);
            };

            videoWs.onclose = () => {
                console.log('Video stream closed');
                setStatus('Connection lost', 'status-error');
            };
        }

        // ---- Latency reporting (decode-side only; we don't have the
        // server's capture timestamp on the wire, so this reports decode
        // latency rather than full glass-to-glass) ----

        let decodeLatencySamples = [];
        function recordDecodeLatency(ms) {
            decodeLatencySamples.push(ms);
        }

        setInterval(() => {
            if (arrivalGapSamples.length > 0) {
                const sorted = [...arrivalGapSamples].sort((a, b) => a - b);
                const n = sorted.length;
                const avgGap = arrivalGapSamples.reduce((a, b) => a + b, 0) / n;
                const maxGap = sorted[n - 1];
                const p95Gap = sorted[Math.floor(n * 0.95)];
                // A "burst" is several messages arriving within a couple ms
                // of each other -- much tighter than one frame interval, so
                // it means a batch was released all at once rather than
                // delivered at a steady per-frame cadence.
                const burstCount = arrivalGapSamples.filter((g) => g < 3).length;
                console.log(
                    `[latency] arrival: n=${n} avgGap=${avgGap.toFixed(1)}ms p95Gap=${p95Gap.toFixed(1)}ms maxGap=${maxGap.toFixed(1)}ms bursts(<3ms)=${burstCount} maxQueue=${maxQueueSeenInWindow} maxFrameBytes=${maxFrameBytesInWindow}`
                );
                arrivalGapSamples = [];
                maxQueueSeenInWindow = 0;
                maxFrameBytesInWindow = 0;
            }

            if (decodeLatencySamples.length === 0) return;
            const avgMs = decodeLatencySamples.reduce((a, b) => a + b, 0) / decodeLatencySamples.length;
            decodeLatencySamples = [];

            console.log(`[latency] decode: ${avgMs.toFixed(1)}ms`);
            wsSend({
                type: 'latency',
                decoding_ms: avgMs,
                total_ms: avgMs,
            });
        }, 5000);

        // ---- Control channel (touch/pointer/resize/latency) ----

        let wsQueue = [];
        function wsSend(message) {
            const json = JSON.stringify(message);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(json);
            } else {
                wsQueue.push(json);
            }
        }

        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws`;

            console.log('Connecting to control WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('Control WebSocket connected');
                ws.send(JSON.stringify({ type: 'ready' }));
                for (const json of wsQueue) {
                    ws.send(json);
                }
                wsQueue = [];
            };

            ws.onerror = (error) => {
                console.error('Control WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('Control WebSocket closed');
            };
        }

        function start() {
            setupDecoder();
            connectWebSocket();
            connectVideoStream();
        }

        // Handle window resize
        let resizeTimeout;
        function sendResizeRequest() {
            // Round to dimensions divisible by 16 for optimal H.264 encoding
            const width = Math.floor(window.innerWidth / 16) * 16;
            const height = Math.floor(window.innerHeight / 16) * 16;

            console.log('Requesting resolution:', width, 'x', height);

            wsSend({
                type: 'resize',
                width: width,
                height: height
            });

            // The next frame will be a different size; let the first
            // decoded frame after this re-measure the canvas.
            canvasSized = false;
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(sendResizeRequest, 300);
        });

        // Send initial resize request after connection
        window.addEventListener('load', () => {
            setTimeout(sendResizeRequest, 1000);
        });

        // Touch input handling
        function normalizeTouches(touchList, canvasRect) {
            const touches = [];
            for (let i = 0; i < touchList.length; i++) {
                const touch = touchList[i];
                // Convert to normalized coordinates (0.0 to 1.0)
                const x = (touch.clientX - canvasRect.left) / canvasRect.width;
                const y = (touch.clientY - canvasRect.top) / canvasRect.height;

                // Only include touches within the canvas bounds
                if (x >= 0 && x <= 1 && y >= 0 && y <= 1) {
                    touches.push({
                        identifier: touch.identifier,
                        x: x,
                        y: y,
                        pressure: touch.force || 0.5 // Use force if available, default to 0.5
                    });
                }
            }
            return touches;
        }

        function sendTouchEvent(eventType, touchList) {
            const canvasRect = canvas.getBoundingClientRect();
            const touches = normalizeTouches(touchList, canvasRect);

            if (touches.length > 0) {
                wsSend({
                    type: 'touch',
                    eventType: eventType,
                    touches: touches
                });
            }
        }

        // Prevent default touch behavior to avoid scrolling/zooming
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            sendTouchEvent('touchstart', e.touches);
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            sendTouchEvent('touchmove', e.touches);
        }, { passive: false });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            // For touchend, we need to send the changed touches (the ones that ended)
            sendTouchEvent('touchend', e.changedTouches);
        }, { passive: false });

        canvas.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            sendTouchEvent('touchcancel', e.changedTouches);
        }, { passive: false });

        // Mouse/pen input handling via Pointer Events. Touch contacts arrive
        // as PointerEvents too (pointerType "touch"), but those are already
        // handled above via the dedicated touch listeners, so they're
        // ignored here to avoid injecting the same physical contact twice.
        function normalizedPointer(e, canvasRect) {
            const x = (e.clientX - canvasRect.left) / canvasRect.width;
            const y = (e.clientY - canvasRect.top) / canvasRect.height;
            return {
                x: Math.min(Math.max(x, 0), 1),
                y: Math.min(Math.max(y, 0), 1),
                button: e.button,
                pointerType: e.pointerType,
                pressure: e.pressure,
            };
        }

        function sendPointerEvent(eventType, pointer) {
            wsSend({ type: 'pointer', eventType, pointer });
        }

        canvas.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') return;
            e.preventDefault();
            canvas.setPointerCapture(e.pointerId);
            sendPointerEvent('pointerdown', normalizedPointer(e, canvas.getBoundingClientRect()));
        });

        canvas.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch') return;
            sendPointerEvent('pointermove', normalizedPointer(e, canvas.getBoundingClientRect()));
        });

        canvas.addEventListener('pointerup', (e) => {
            if (e.pointerType === 'touch') return;
            canvas.releasePointerCapture(e.pointerId);
            sendPointerEvent('pointerup', normalizedPointer(e, canvas.getBoundingClientRect()));
        });

        canvas.addEventListener('pointercancel', (e) => {
            if (e.pointerType === 'touch') return;
            sendPointerEvent('pointercancel', normalizedPointer(e, canvas.getBoundingClientRect()));
        });

        // Disable the native context menu so right-click reaches the remote app
        canvas.addEventListener('contextmenu', (e) => e.preventDefault());

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const canvasRect = canvas.getBoundingClientRect();
            const x = Math.min(Math.max((e.clientX - canvasRect.left) / canvasRect.width, 0), 1);
            const y = Math.min(Math.max((e.clientY - canvasRect.top) / canvasRect.height, 0), 1);
            wsSend({
                type: 'pointer',
                eventType: 'wheel',
                x: x,
                y: y,
                deltaX: e.deltaX,
                deltaY: e.deltaY,
            });
        }, { passive: false });

        // Start the connection
        start();

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (videoWs) videoWs.close();
            if (decoder && decoder.state !== 'closed') decoder.close();
        });
    </script>
</body>
</html>
