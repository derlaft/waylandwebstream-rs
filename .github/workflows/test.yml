name: test

# CI test gate + packaging smoke build. The whole pipeline lives in the
# multi-stage Dockerfile (Debian trixie / FFmpeg 7.1); this workflow just drives
# `docker build` against its stages. See TESTING.md for the test tiers.
#
# The lint + tiered tests run on every push/PR. The packaging smoke build and
# artifact upload are the expensive part, so they run on `workflow_dispatch`
# only (trigger the workflow manually to get a CI .deb) to conserve Actions
# minutes -- releases build the real .deb via release.yml anyway.

on:
  # TEMPORARY: push trigger disabled -- CI runs take >5m and we push frequently.
  # Re-enable by uncommenting `push:` below.
  # push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      # The `test` stage runs fmt/clippy (report-only) + web checks + the Rust
      # test tiers; the build fails if any blocking test fails.
      - name: Lint + tiered tests (Dockerfile `test` stage)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # The `artifact` stage builds the release binary and packages the .deb.
      # Manual-only (workflow_dispatch) to save Actions minutes on push/PR.
      - name: Smoke-build the .deb (Dockerfile `artifact` stage)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: artifact
          build-args: |
            WWS_VERSION=0.0.0-ci
          outputs: type=local,dest=dist
          cache-from: type=gha

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ github.event_name == 'workflow_dispatch' }}
        with:
          name: waylandwebstream-deb-ci
          path: dist/*.deb
          if-no-files-found: error
