name: release

# Hardened, maintainer-triggered release: build the .deb (via the Dockerfile
# `artifact` stage), assemble the APT archive, sign it with the Secrets-held GPG
# signing subkey, and publish to gh-pages. See docs/apt-repo.md.
#
# "Final say" = only the maintainer can run this (workflow_dispatch). Signing
# never happens on push/PR. The signing secret is scoped to the protected
# `release` environment, so only this job can read it.
#
# One-time prerequisites (docs/apt-repo.md):
#   - Secret  GPG_SIGNING_SUBKEY  (armored signing-SUBKEY export) on the
#     protected `release` environment.
#   - File    packaging/KEY.gpg   (armored PUBLIC primary key) committed.
#   - GitHub Pages serving the `gh-pages` branch.
#
# The build/package pipeline is in the Dockerfile; only signing + publishing
# (which need the secret and a git push) live here as workflow glue.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Package version (default: Cargo.toml version)"
        required: false

permissions:
  contents: read

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
    steps:
      - name: Checkout source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5  # v4.1.0

      - name: Determine version
        id: ver
        run: |
          v="${{ github.event.inputs.version }}"
          [ -z "$v" ] && v=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Releasing version: $v"

      - name: Build .deb (Dockerfile `artifact` stage)
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        with:
          context: .
          target: artifact
          build-args: |
            WWS_VERSION=${{ steps.ver.outputs.version }}
          outputs: type=local,dest=dist
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Pull the existing archive so older packages in pool/ are preserved.
      # First-ever release: the branch may not exist yet -- bootstrap empty.
      - name: Checkout existing gh-pages
        continue-on-error: true
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          ref: gh-pages
          path: site
          fetch-depth: 0

      - name: Bootstrap site dir if gh-pages is new
        run: mkdir -p site

      - name: Assemble + sign APT archive
        env:
          GPG_SIGNING_SUBKEY: ${{ secrets.GPG_SIGNING_SUBKEY }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends dpkg-dev apt-utils gnupg

          VER="${{ steps.ver.outputs.version }}"
          DEB=$(ls dist/*.deb)
          SUITE=trixie

          # 1. Drop the new package into the pool.
          POOL="site/pool/main/w/waylandwebstream"
          mkdir -p "$POOL"
          cp "$DEB" "$POOL/"

          # 2. Public signing key for end users.
          cp packaging/KEY.gpg site/KEY.gpg

          # 3. Generate Packages over the whole pool.
          ARCHDIR="site/dists/$SUITE/main/binary-amd64"
          mkdir -p "$ARCHDIR"
          ( cd site && dpkg-scanpackages --arch amd64 pool /dev/null ) > "$ARCHDIR/Packages"
          gzip -9c "$ARCHDIR/Packages" > "$ARCHDIR/Packages.gz"

          # 4. Top-level Release over dists/<suite>.
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin=waylandwebstream \
            -o APT::FTPArchive::Release::Label=waylandwebstream \
            -o APT::FTPArchive::Release::Suite="$SUITE" \
            -o APT::FTPArchive::Release::Codename="$SUITE" \
            -o APT::FTPArchive::Release::Components=main \
            -o APT::FTPArchive::Release::Architectures=amd64 \
            release "site/dists/$SUITE" > "site/dists/$SUITE/Release"

          # 5. Import the signing subkey into an ephemeral keyring and sign.
          export GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          printf '%s' "$GPG_SIGNING_SUBKEY" | gpg --batch --import
          KEYID=$(gpg --list-keys --with-colons | awk -F: '/^pub/{print $5; exit}')
          gpg --batch --yes --local-user "$KEYID" \
            --clearsign -o "site/dists/$SUITE/InRelease" "site/dists/$SUITE/Release"
          gpg --batch --yes --local-user "$KEYID" \
            -abs -o "site/dists/$SUITE/Release.gpg" "site/dists/$SUITE/Release"
          rm -rf "$GNUPGHOME"

      - name: Publish to gh-pages
        run: |
          set -euo pipefail
          cd site
          touch .nojekyll
          # Republish as a single fresh commit. The existing pool/ packages were
          # checked out into site/ above, so content is preserved even though the
          # branch history is squashed (fine for a published-artifact branch).
          rm -rf .git
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "release: waylandwebstream ${{ steps.ver.outputs.version }}"
          git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages
