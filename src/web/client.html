<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaylandWebStream Client</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            font-family: sans-serif;
        }
        #video {
            display: block;
            object-fit: none;
            touch-action: none;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
        }
        .status-connecting { color: #ffa500; }
        .status-connected { color: #00ff00; }
        .status-error { color: #ff0000; }
    </style>
</head>
<body>
    <div id="status" class="status-connecting">Connecting...</div>
    <video id="video" autoplay playsinline muted></video>

    <script>
        console.log('WaylandWebStream client starting...');

        const status = document.getElementById('status');
        const video = document.getElementById('video');

        let pc = null;
        let ws = null;

        function setStatus(text, className) {
            status.textContent = text;
            status.className = className;
        }

        async function start() {
            try {
                setStatus('Fetching ICE config...', 'status-connecting');

                // Fetch the STUN/TURN server list from the server (it embeds
                // its own TURN relay, with credentials generated at startup).
                const iceConfigResponse = await fetch('/ice-config');
                if (!iceConfigResponse.ok) {
                    throw new Error('Failed to fetch ICE config: ' + iceConfigResponse.statusText);
                }
                const { iceServers } = await iceConfigResponse.json();

                setStatus('Creating peer connection...', 'status-connecting');

                // Create RTCPeerConnection with STUN + the embedded TURN relay
                pc = new RTCPeerConnection({ iceServers });

                // Handle incoming tracks
                pc.ontrack = (event) => {
                    console.log('Received track:', event.track.kind);
                    if (event.track.kind === 'video') {
                        video.srcObject = event.streams[0];
                        setStatus('Connected - Streaming', 'status-connected');

                        // By default browsers hold back ~150-200ms of video in a
                        // jitter buffer to smooth over network timing variance.
                        // We'd rather drop a frame than queue it, so ask for the
                        // smallest buffer the implementation allows. Both names
                        // exist in the wild (jitterBufferTarget is the newer
                        // replacement for the older playoutDelayHint); set both
                        // since support is inconsistent across browsers.
                        const receiver = event.receiver;
                        try { receiver.jitterBufferTarget = 0; } catch (e) {}
                        try { receiver.playoutDelayHint = 0; } catch (e) {}
                    }
                };

                // Start measuring and reporting latency via WebSocket
                let lastFrameTime = null;
                
                // Monitor video playback to measure latency
                video.addEventListener('timeupdate', () => {
                    const now = performance.now();
                    if (lastFrameTime) {
                        // Estimate latency from frame rate irregularities
                        // For now, use a simple heuristic based on stats
                        // We'll report this periodically via WebSocket
                    }
                    lastFrameTime = now;
                });
                
                // Periodically report detailed latency stats via WebSocket
                setInterval(() => {
                    if (pc && pc.connectionState === 'connected') {
                        pc.getStats().then(stats => {
                            let rtt = null;
                            let jitterBufferDelay = 0;
                            let jitterBufferEmittedCount = 0;
                            let framesDecoded = 0;
                            let totalDecodeTime = 0;
                            
                            stats.forEach(report => {
                                // Get RTT from candidate pair
                                if (report.type === 'candidate-pair') {
                                    if (report.state === 'succeeded' || report.nominated) {
                                        if (report.currentRoundTripTime !== undefined && report.currentRoundTripTime > 0) {
                                            rtt = report.currentRoundTripTime * 1000; // Convert to ms
                                        }
                                    }
                                }
                                
                                // Get remote candidate RTT if available
                                if (report.type === 'remote-candidate' && report.roundTripTime) {
                                    if (rtt === null) {
                                        rtt = report.roundTripTime;
                                    }
                                }
                                
                                // Get jitter buffer and decode stats from inbound-rtp
                                if (report.type === 'inbound-rtp' && report.kind === 'video') {
                                    if (report.jitterBufferDelay !== undefined && report.jitterBufferEmittedCount !== undefined) {
                                        jitterBufferDelay = report.jitterBufferDelay;
                                        jitterBufferEmittedCount = report.jitterBufferEmittedCount;
                                    }
                                    if (report.framesDecoded !== undefined && report.totalDecodeTime !== undefined) {
                                        framesDecoded = report.framesDecoded;
                                        totalDecodeTime = report.totalDecodeTime;
                                    }
                                }
                            });
                            
                            // If we still don't have RTT, estimate from localhost
                            if (rtt === null || rtt === 0) {
                                const isLocalhost = window.location.hostname === 'localhost' || 
                                                   window.location.hostname === '127.0.0.1';
                                rtt = isLocalhost ? 1 : 50; // 1ms for localhost, 50ms default fallback
                            }
                            
                            // Calculate average jitter buffer delay per frame
                            const avgJitterMs = jitterBufferEmittedCount > 0 
                                ? (jitterBufferDelay / jitterBufferEmittedCount) * 1000 
                                : 0;
                            
                            // Calculate average decode time per frame
                            const avgDecodeMs = framesDecoded > 0
                                ? (totalDecodeTime / framesDecoded) * 1000
                                : 0;
                            
                            // Build detailed latency report
                            const networkMs = rtt / 2; // One-way network delay
                            const encodingEstimate = 16.7; // ~1 frame at 60fps
                            const totalLatency = networkMs + avgJitterMs + avgDecodeMs + encodingEstimate;
                            
                            // Send detailed report via WebSocket
                            wsSend({
                                type: 'latency',
                                encoding_ms: encodingEstimate,
                                network_ms: networkMs,
                                jitter_buffer_ms: avgJitterMs,
                                decoding_ms: avgDecodeMs,
                                total_ms: totalLatency
                            });
                        });
                    }
                }, 1000); // Report every 1 second

                // Handle ICE connection state changes
                pc.oniceconnectionstatechange = () => {
                    console.log('ICE connection state:', pc.iceConnectionState);
                    if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
                        setStatus('Connection lost', 'status-error');
                    } else if (pc.iceConnectionState === 'connected') {
                        setStatus('Connected - Streaming', 'status-connected');
                    }
                };

                // Handle connection state changes
                pc.onconnectionstatechange = () => {
                    console.log('Connection state:', pc.connectionState);
                    if (pc.connectionState === 'failed') {
                        setStatus('Connection failed', 'status-error');
                    }
                };

                // Attach the ICE candidate handler now, before any network
                // round trip. Gathering starts as soon as setLocalDescription
                // is called below, and candidates fired before a listener is
                // attached are lost forever (events aren't replayed) - so
                // this must happen before createOffer/setLocalDescription,
                // not after the offer/answer exchange completes.
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        wsSend({
                            type: 'ice',
                            candidate: {
                                candidate: event.candidate.candidate,
                                sdpMLineIndex: event.candidate.sdpMLineIndex,
                                sdpMid: event.candidate.sdpMid
                            }
                        });
                    }
                };

                // Add transceiver for receiving video
                pc.addTransceiver('video', { direction: 'recvonly' });

                // Create offer
                setStatus('Creating offer...', 'status-connecting');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                console.log('Sending offer to server...');

                // Send offer to server
                const response = await fetch('/offer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: offer.type,
                        sdp: offer.sdp
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to send offer: ' + response.statusText);
                }

                const answer = await response.json();
                console.log('Received answer from server');

                // Set remote description
                await pc.setRemoteDescription(new RTCSessionDescription(answer));

                setStatus('Waiting for video...', 'status-connecting');

                // Connect to WebSocket for ICE candidate exchange
                connectWebSocket();

                startStatsLogging();

            } catch (error) {
                console.error('Error:', error);
                setStatus('Error: ' + error.message, 'status-error');
            }
        }

        // ICE gathering produces candidates well before the WebSocket opens
        // (it isn't connected until after the SDP offer/answer round trip).
        // Queue anything sent before `ws.onopen` instead of throwing.
        let wsQueue = [];
        function wsSend(message) {
            const json = JSON.stringify(message);
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(json);
            } else {
                wsQueue.push(json);
            }
        }

        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws`;

            console.log('Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                ws.send(JSON.stringify({ type: 'ready' }));
                for (const json of wsQueue) {
                    ws.send(json);
                }
                wsQueue = [];
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.type === 'ice') {
                        await pc.addIceCandidate(new RTCIceCandidate({
                            candidate: msg.candidate.candidate,
                            sdpMLineIndex: msg.candidate.sdpMLineIndex,
                            sdpMid: msg.candidate.sdpMid
                        }));
                    }
                } catch (error) {
                    console.error('Error handling WebSocket message:', error);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
            };
        }

        // Log the actual end-to-end delay contributors once a second, so
        // changes to buffering/playout settings can be verified rather than
        // assumed: jitter buffer delay (receive-side queuing) and round-trip
        // time (network) are the two that browser-side tweaks can affect.
        let lastJitterStats = null;
        function startStatsLogging() {
            setInterval(async () => {
                if (!pc || pc.connectionState !== 'connected') return;
                const stats = await pc.getStats();
                let jitterBufferDelay, jitterBufferEmittedCount, rttMs;
                stats.forEach((report) => {
                    if (report.type === 'inbound-rtp' && report.kind === 'video') {
                        jitterBufferDelay = report.jitterBufferDelay;
                        jitterBufferEmittedCount = report.jitterBufferEmittedCount;
                    }
                    if (report.type === 'candidate-pair' && report.state === 'succeeded' && report.currentRoundTripTime !== undefined) {
                        rttMs = report.currentRoundTripTime * 1000;
                    }
                });

                if (lastJitterStats && jitterBufferEmittedCount > lastJitterStats.count) {
                    const deltaDelay = jitterBufferDelay - lastJitterStats.delay;
                    const deltaCount = jitterBufferEmittedCount - lastJitterStats.count;
                    const avgBufferMs = (deltaDelay / deltaCount) * 1000;
                    console.log(`[stats] jitter buffer: ${avgBufferMs.toFixed(1)}ms, rtt: ${rttMs !== undefined ? rttMs.toFixed(1) + 'ms' : 'n/a'}`);
                }
                lastJitterStats = { delay: jitterBufferDelay, count: jitterBufferEmittedCount };
            }, 1000);
        }

        // Handle autoplay policy
        video.onloadedmetadata = () => {
            video.play().catch(() => {
                // Create play button if autoplay is blocked
                const playButton = document.createElement('button');
                playButton.textContent = 'Click to Play';
                playButton.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; cursor: pointer; z-index: 1001;';
                playButton.onclick = () => {
                    video.play();
                    playButton.remove();
                };
                document.body.appendChild(playButton);
            });
        };

        // Handle window resize
        let resizeTimeout;
        function sendResizeRequest() {
            // Round to dimensions divisible by 16 for optimal H.264 encoding
            const width = Math.floor(window.innerWidth / 16) * 16;
            const height = Math.floor(window.innerHeight / 16) * 16;
            
            console.log('Requesting resolution:', width, 'x', height);
            
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({
                    type: 'resize',
                    width: width,
                    height: height
                }));
            }
        }

        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(sendResizeRequest, 300);
        });

        // Send initial resize request after connection
        window.addEventListener('load', () => {
            setTimeout(sendResizeRequest, 1000);
        });

        // Touch input handling
        function normalizeTouches(touchList, videoRect) {
            const touches = [];
            for (let i = 0; i < touchList.length; i++) {
                const touch = touchList[i];
                // Convert to normalized coordinates (0.0 to 1.0)
                const x = (touch.clientX - videoRect.left) / videoRect.width;
                const y = (touch.clientY - videoRect.top) / videoRect.height;
                
                // Only include touches within the video bounds
                if (x >= 0 && x <= 1 && y >= 0 && y <= 1) {
                    touches.push({
                        identifier: touch.identifier,
                        x: x,
                        y: y,
                        pressure: touch.force || 0.5 // Use force if available, default to 0.5
                    });
                }
            }
            return touches;
        }

        function sendTouchEvent(eventType, touchList) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            
            const videoRect = video.getBoundingClientRect();
            const touches = normalizeTouches(touchList, videoRect);
            
            if (touches.length > 0) {
                ws.send(JSON.stringify({
                    type: 'touch',
                    eventType: eventType,
                    touches: touches
                }));
            }
        }

        // Prevent default touch behavior to avoid scrolling/zooming
        video.addEventListener('touchstart', (e) => {
            e.preventDefault();
            sendTouchEvent('touchstart', e.touches);
        }, { passive: false });

        video.addEventListener('touchmove', (e) => {
            e.preventDefault();
            sendTouchEvent('touchmove', e.touches);
        }, { passive: false });

        video.addEventListener('touchend', (e) => {
            e.preventDefault();
            // For touchend, we need to send the changed touches (the ones that ended)
            sendTouchEvent('touchend', e.changedTouches);
        }, { passive: false });

        video.addEventListener('touchcancel', (e) => {
            e.preventDefault();
            sendTouchEvent('touchcancel', e.changedTouches);
        }, { passive: false });

        // Mouse/pen input handling via Pointer Events. Touch contacts arrive
        // as PointerEvents too (pointerType "touch"), but those are already
        // handled above via the dedicated touch listeners, so they're
        // ignored here to avoid injecting the same physical contact twice.
        function normalizedPointer(e, videoRect) {
            const x = (e.clientX - videoRect.left) / videoRect.width;
            const y = (e.clientY - videoRect.top) / videoRect.height;
            return {
                x: Math.min(Math.max(x, 0), 1),
                y: Math.min(Math.max(y, 0), 1),
                button: e.button,
                pointerType: e.pointerType,
                pressure: e.pressure,
            };
        }

        function sendPointerEvent(eventType, pointer) {
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            ws.send(JSON.stringify({ type: 'pointer', eventType, pointer }));
        }

        video.addEventListener('pointerdown', (e) => {
            if (e.pointerType === 'touch') return;
            e.preventDefault();
            video.setPointerCapture(e.pointerId);
            sendPointerEvent('pointerdown', normalizedPointer(e, video.getBoundingClientRect()));
        });

        video.addEventListener('pointermove', (e) => {
            if (e.pointerType === 'touch') return;
            sendPointerEvent('pointermove', normalizedPointer(e, video.getBoundingClientRect()));
        });

        video.addEventListener('pointerup', (e) => {
            if (e.pointerType === 'touch') return;
            video.releasePointerCapture(e.pointerId);
            sendPointerEvent('pointerup', normalizedPointer(e, video.getBoundingClientRect()));
        });

        video.addEventListener('pointercancel', (e) => {
            if (e.pointerType === 'touch') return;
            sendPointerEvent('pointercancel', normalizedPointer(e, video.getBoundingClientRect()));
        });

        // Disable the native context menu so right-click reaches the remote app
        video.addEventListener('contextmenu', (e) => e.preventDefault());

        video.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!ws || ws.readyState !== WebSocket.OPEN) return;
            const videoRect = video.getBoundingClientRect();
            const x = Math.min(Math.max((e.clientX - videoRect.left) / videoRect.width, 0), 1);
            const y = Math.min(Math.max((e.clientY - videoRect.top) / videoRect.height, 0), 1);
            ws.send(JSON.stringify({
                type: 'pointer',
                eventType: 'wheel',
                x: x,
                y: y,
                deltaX: e.deltaX,
                deltaY: e.deltaY,
            }));
        }, { passive: false });

        // Start the connection
        start();

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (pc) pc.close();
        });
    </script>
</body>
</html>
