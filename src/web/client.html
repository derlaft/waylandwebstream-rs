<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WaylandWebStream Client</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: sans-serif;
        }
        #video {
            max-width: 100%;
            max-height: 100vh;
            display: block;
        }
        #status {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 1000;
        }
        .status-connecting { color: #ffa500; }
        .status-connected { color: #00ff00; }
        .status-error { color: #ff0000; }
    </style>
</head>
<body>
    <div id="status" class="status-connecting">Connecting...</div>
    <video id="video" autoplay playsinline muted></video>

    <script>
        console.log('WaylandWebStream client starting...');

        const status = document.getElementById('status');
        const video = document.getElementById('video');

        let pc = null;
        let ws = null;

        function setStatus(text, className) {
            status.textContent = text;
            status.className = className;
        }

        async function start() {
            try {
                setStatus('Creating peer connection...', 'status-connecting');

                // Create RTCPeerConnection with STUN server
                pc = new RTCPeerConnection({
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' }
                    ]
                });

                // Handle incoming tracks
                pc.ontrack = (event) => {
                    console.log('Received track:', event.track.kind);
                    if (event.track.kind === 'video') {
                        video.srcObject = event.streams[0];
                        setStatus('Connected - Streaming', 'status-connected');
                    }
                };

                // Handle ICE connection state changes
                pc.oniceconnectionstatechange = () => {
                    console.log('ICE connection state:', pc.iceConnectionState);
                    if (pc.iceConnectionState === 'failed' || pc.iceConnectionState === 'disconnected') {
                        setStatus('Connection lost', 'status-error');
                    } else if (pc.iceConnectionState === 'connected') {
                        setStatus('Connected - Streaming', 'status-connected');
                    }
                };

                // Handle connection state changes
                pc.onconnectionstatechange = () => {
                    console.log('Connection state:', pc.connectionState);
                    if (pc.connectionState === 'failed') {
                        setStatus('Connection failed', 'status-error');
                    }
                };

                // Add transceiver for receiving video
                pc.addTransceiver('video', { direction: 'recvonly' });

                // Create offer
                setStatus('Creating offer...', 'status-connecting');
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);

                console.log('Sending offer to server...');

                // Send offer to server
                const response = await fetch('/offer', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        type: offer.type,
                        sdp: offer.sdp
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to send offer: ' + response.statusText);
                }

                const answer = await response.json();
                console.log('Received answer from server');

                // Set remote description
                await pc.setRemoteDescription(new RTCSessionDescription(answer));

                setStatus('Waiting for video...', 'status-connecting');

                // Connect to WebSocket for ICE candidate exchange
                connectWebSocket();

            } catch (error) {
                console.error('Error:', error);
                setStatus('Error: ' + error.message, 'status-error');
            }
        }

        function connectWebSocket() {
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws`;
            
            console.log('Connecting to WebSocket:', wsUrl);
            ws = new WebSocket(wsUrl);

            ws.onopen = () => {
                console.log('WebSocket connected');
                ws.send(JSON.stringify({ type: 'ready' }));
            };

            ws.onmessage = async (event) => {
                try {
                    const msg = JSON.parse(event.data);
                    
                    if (msg.type === 'ice') {
                        await pc.addIceCandidate(new RTCIceCandidate({
                            candidate: msg.candidate.candidate,
                            sdpMLineIndex: msg.candidate.sdpMLineIndex,
                            sdpMid: msg.candidate.sdpMid
                        }));
                    }
                } catch (error) {
                    console.error('Error handling WebSocket message:', error);
                }
            };

            ws.onerror = (error) => {
                console.error('WebSocket error:', error);
            };

            ws.onclose = () => {
                console.log('WebSocket closed');
            };

            // Send ICE candidates to server
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    ws.send(JSON.stringify({
                        type: 'ice',
                        candidate: {
                            candidate: event.candidate.candidate,
                            sdpMLineIndex: event.candidate.sdpMLineIndex,
                            sdpMid: event.candidate.sdpMid
                        }
                    }));
                }
            };
        }

        // Handle autoplay policy
        video.onloadedmetadata = () => {
            video.play().catch(() => {
                // Create play button if autoplay is blocked
                const playButton = document.createElement('button');
                playButton.textContent = 'Click to Play';
                playButton.style.cssText = 'position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 20px 40px; font-size: 20px; cursor: pointer; z-index: 1001;';
                playButton.onclick = () => {
                    video.play();
                    playButton.remove();
                };
                document.body.appendChild(playButton);
            });
        };

        // Start the connection
        start();

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (ws) ws.close();
            if (pc) pc.close();
        });
    </script>
</body>
</html>
