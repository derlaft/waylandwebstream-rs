# nfpm packaging spec -- https://nfpm.goreleaser.com
#
# One spec drives the Debian .deb today and (plan M5) an RPM later. nfpm does
# NOT auto-compute shared-library Depends, so the `depends:` list below is the
# output of `dpkg-shlibdeps` against the built binary on trixie (FFmpeg 7.1).
# Regenerate it with `just deps` whenever the linked native libs change.
#
# Version is taken from the WWS_VERSION env var (the Justfile / CI sets it), so
# this file never carries a stale version. Invoke via `just package`.

name: waylandwebstream
arch: amd64
platform: linux
version: ${WWS_VERSION}
section: net
priority: optional
maintainer: Aleksei Kharlamov <dh@devass.club>
homepage: https://github.com/derlaft/waylandwebstream-rs
license: AGPL-3.0
description: |
  Headless Wayland compositor that streams to a browser.
  Runs a headless Smithay Wayland compositor, encodes the framebuffer to H.264
  (FFmpeg) and audio to Opus (PipeWire), and serves video + audio + remote
  touch/keyboard/clipboard control to a browser over a single WebSocket. Binds
  loopback by default; put an authenticating reverse proxy in front to expose it.

# Runtime dependencies -- generated by `dpkg-shlibdeps` (see `just deps`).
# Only the binary's direct DT_NEEDED libraries; apt resolves the rest.
depends:
  - libavcodec61 (>= 7:7.1.5)
  - libavdevice61 (>= 7:7.1.5)
  - libavfilter10 (>= 7:7.1.5)
  - libavutil59 (>= 7:7.1.5)
  - libc6 (>= 2.39)
  - libgbm1 (>= 21.3.0~rc1)
  - libgcc-s1 (>= 4.2)
  - libopus0 (>= 1.1)
  - libpipewire-0.3-0t64 (>= 0.3.1)
  - libswscale8 (>= 7:7.1.5)
  - libxkbcommon0 (>= 0.5.0)

contents:
  - src: ./target/release/waylandwebstream
    dst: /usr/bin/waylandwebstream
    file_info:
      mode: 0755

  # systemd --user unit (see packaging/systemd/). Enabled per-user, not at
  # install time -- the postinstall script explains how.
  - src: ./packaging/systemd/waylandwebstream.service
    dst: /usr/lib/systemd/user/waylandwebstream.service
    file_info:
      mode: 0644

scripts:
  postinstall: ./packaging/nfpm/postinstall.sh

deb:
  fields:
    Vcs-Git: https://github.com/derlaft/waylandwebstream-rs.git
    Vcs-Browser: https://github.com/derlaft/waylandwebstream-rs
